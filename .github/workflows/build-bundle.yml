name: Build Kettu JS Bundle and Plugins

# Build the Kettu JS bundle AND the external plugins, then publish everything
# onto the `dist` branch as a single force-push so consumers can pin a stable
# URL.
#
# Resulting layout on the `dist` branch:
#   /
#   ├── kettu.js
#   ├── kettu.min.js          (same content; kept under the default name used by the tweak)
#   ├── BUILD_INFO.txt
#   └── plugins/
#       ├── repo.json          ← add this URL in Kettu → Plugins → Add custom plugin repository
#       └── builds/
#           └── <plugin-id>/
#               ├── manifest.json
#               └── index.js
#
# Custom URLs once the repo is public:
#   Bundle:  https://raw.githubusercontent.com/<owner>/<repo>/dist/kettu.js
#   Plugins: https://raw.githubusercontent.com/<owner>/<repo>/dist/plugins/

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'Kettu/src/**'
      - 'Kettu/package.json'
      - 'Kettu/bun.lock'
      - 'Kettu/scripts/**'
      - 'plugins/src/**'
      - 'plugins/build.mjs'
      - 'plugins/package.json'
      - 'plugins/bunny-types.d.ts'
      - '.github/workflows/build-bundle.yml'

jobs:
  build:
    name: Build bundle + plugins
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # -----------------------------------------------------------------
      # Build the Kettu JS bundle
      # -----------------------------------------------------------------
      - name: Install Kettu dependencies
        working-directory: ./Kettu
        run: bun install --frozen-lockfile

      - name: Build Kettu bundle
        working-directory: ./Kettu
        run: bun run build

      - name: Verify Kettu bundle
        run: |
          ls -lh Kettu/dist/
          file Kettu/dist/kettu.js
          echo "Kettu bundle size: $(du -h Kettu/dist/kettu.js | cut -f1)"

      # -----------------------------------------------------------------
      # Build the external plugins
      # -----------------------------------------------------------------
      - name: Install plugin build dependencies
        working-directory: ./plugins
        run: bun install --no-save

      - name: Build plugins
        working-directory: ./plugins
        run: node build.mjs

      - name: Verify plugin builds
        run: |
          ls -lh plugins/builds/ || true
          find plugins/builds -type f \( -name '*.json' -o -name '*.js' \) | sort
          cat plugins/builds/repo.json

      # -----------------------------------------------------------------
      # Upload artifacts so we can also download builds from the Actions UI
      # -----------------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kettu-bundle-and-plugins
          path: |
            Kettu/dist/kettu.js
            plugins/builds/**/*
            plugins/repo.json
          if-no-files-found: error

      # -----------------------------------------------------------------
      # Publish to the `dist` branch
      # -----------------------------------------------------------------
      - name: Publish to `dist` branch
        run: |
          PUBLISH_DIR=/tmp/dist-publish
          mkdir -p "$PUBLISH_DIR/plugins"

          # Kettu bundle
          cp Kettu/dist/kettu.js "$PUBLISH_DIR/kettu.js"
          cp Kettu/dist/kettu.js "$PUBLISH_DIR/kettu.min.js"

          # Plugin builds
          cp plugins/repo.json "$PUBLISH_DIR/plugins/repo.json"
          if [ -d plugins/builds ]; then
            mkdir -p "$PUBLISH_DIR/plugins/builds"
            cp -R plugins/builds/. "$PUBLISH_DIR/plugins/builds/"
          fi

          # Build metadata
          {
            echo "Built on $(date -u)"
            echo "Source commit: ${GITHUB_SHA}"
            echo
            echo "URLs:"
            echo "  Bundle:    https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/dist/kettu.js"
            echo "  Plugin repo: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/dist/plugins/repo.json"
          } > "$PUBLISH_DIR/BUILD_INFO.txt"

          cd "$PUBLISH_DIR"
          git init -b dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "build: bundle + plugins from ${GITHUB_SHA::7}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
